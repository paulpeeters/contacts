<!-- Shared modal, reused app-wide instead of native alert()/confirm() (which
     look out of place and can be silently blocked/ignored by browsers).
     appAlert(message) shows an info modal with just "OK"; appConfirm(message,
     onConfirm) shows "Annuleren"/"Bevestigen" and only runs onConfirm when
     the user confirms. -->
<dialog id="app-modal">
  <article>
    <p id="app-modal-message"></p>
    <footer>
      <button id="app-modal-cancel" class="secondary outline" style="display:none">Annuleren</button>
      <button id="app-modal-ok">OK</button>
    </footer>
  </article>
</dialog>

<script>
  (function () {
    var modal = document.getElementById('app-modal');
    var messageEl = document.getElementById('app-modal-message');
    var cancelBtn = document.getElementById('app-modal-cancel');
    var okBtn = document.getElementById('app-modal-ok');
    var onConfirm = null;

    window.appAlert = function (message) {
      messageEl.textContent = message;
      cancelBtn.style.display = 'none';
      okBtn.textContent = 'OK';
      onConfirm = null;
      modal.showModal();
    };

    window.appConfirm = function (message, confirmCallback) {
      messageEl.textContent = message;
      cancelBtn.style.display = '';
      okBtn.textContent = 'Bevestigen';
      onConfirm = confirmCallback;
      modal.showModal();
    };

    okBtn.addEventListener('click', function () {
      var cb = onConfirm;
      onConfirm = null;
      modal.close();
      if (cb) cb();
    });
    cancelBtn.addEventListener('click', function () {
      onConfirm = null;
      modal.close();
    });

    // htmx swallows non-2xx responses by default (no visible feedback), so
    // without this a blocked action (e.g. deleting a household that still
    // has members) looks like it silently did nothing. Surface the server's
    // error message instead.
    document.body.addEventListener('htmx:responseError', function (evt) {
      var xhr = evt.detail.xhr;
      appAlert(xhr.responseText || ('Er ging iets mis (status ' + xhr.status + ').'));
    });

    // htmx fires htmx:confirm right before issuing a request for any element
    // with hx-confirm (used app-wide for delete buttons + "Afsluiten") and
    // would otherwise fall back to the browser's native confirm() popup.
    // Intercept it so every hx-confirm gets the same styled modal instead,
    // without touching the hx-confirm attributes themselves.
    document.body.addEventListener('htmx:confirm', function (evt) {
      if (!evt.detail.question) return; // no hx-confirm on this element
      evt.preventDefault();
      appConfirm(evt.detail.question, function () {
        evt.detail.issueRequest(true);
      });
    });
  })();
</script>
{{end}}
